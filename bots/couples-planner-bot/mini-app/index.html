<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b9d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Наш планировщик 💕</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      /* Убираем мерцание при загрузке */
      body {
        margin: 0;
        background: linear-gradient(180deg, #ffeef8 0%, #fff5f7 50%, #ffffff 100%);
        overflow-x: hidden;
      }
      /* Прелоадер */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #ff6b9d 0%, #c86dd7 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #preloader.hide {
        opacity: 0;
        pointer-events: none;
      }
      .preloader-heart {
        font-size: 64px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .preloader-text {
        color: white;
        margin-top: 20px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 600;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-heart">💕</div>
      <div class="preloader-text">Загружаем...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Убираем прелоадер после загрузки
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('preloader').classList.add('hide');
        }, 500);
      });
    </script>
  </body>
</html>
